services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workforce_copilot}
      POSTGRES_USER: ${POSTGRES_USER:-workforce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workforce}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-workforce} -d ${POSTGRES_DB:-workforce_copilot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: python:3.12-slim
    working_dir: /workspace/apps/api
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://workforce:workforce@postgres:5432/workforce_copilot}
    volumes:
      - .:/workspace
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: node:22-alpine
    working_dir: /workspace/apps/web
    command: >
      sh -c "npm install &&
      npm run dev"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    volumes:
      - .:/workspace
      - web-node-modules:/workspace/apps/web/node_modules
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - api

volumes:
  postgres-data:
  web-node-modules:
